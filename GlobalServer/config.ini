; ============================================
; GlobalServer 配置文件
; 全局服务器 - 账号管理和服务器列表维护
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerID: 服务器唯一标识ID
; 用于区分不同的GlobalServer实例
ServerID = 1

; ServerName: 服务器名称
; 用于日志和监控显示
ServerName = GlobalServer

; GroupID: 服务器分组名称
; 用于服务器分组管理，同组服务器共享某些资源
; 默认值: default
GroupID = default

; WorkerID: Snowflake工作机器ID（0-31）
; 用于生成分布式唯一ID
; 多实例部署时每个实例必须不同
; WorkerID = 1

; DatacenterID: Snowflake数据中心ID（0-31）
; 用于生成分布式唯一ID
; 不同数据中心使用不同ID
; DatacenterID = 1

; JWTSecret: JWT签名密钥
; 用于生成和验证JWT token
; 多个GlobalServer实例必须使用相同的密钥
; 生产环境请使用强随机密钥
JWTSecret = zMmoServerSecretKey

[HTTP]
; --------------------------------------------
; HTTP服务配置
; 提供RESTful API接口
; --------------------------------------------
; ListenAddress: HTTP服务监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; 生产环境建议绑定具体IP
ListenAddress = 0.0.0.0:8888

; MaxClientCount: 最大客户端连接数
; HTTP服务的最大并发连接数
; 建议值: 1000-50000，默认10000
MaxClientCount = 10000

; MaxPacketDataSize: 最大数据包大小（字节）
; HTTP请求体的最大大小
; 默认1MB，防止大文件上传攻击
; 建议值: 1048576(1MB) - 10485760(10MB)
MaxPacketDataSize = 1048576

; Enabled: 是否启用HTTP服务
; true - 启用HTTP服务
; false - 禁用HTTP服务
Enabled = true

[Log]
; --------------------------------------------
; 日志配置
; 使用zap高性能日志库
; --------------------------------------------
; Level: 日志级别
; -1: debug - 调试信息，最详细
;  0: info  - 一般信息，适合生产环境
;  1: warn  - 警告信息
;  2: error - 错误信息
;  3: dpanic - 开发环境panic
;  4: panic - 运行时panic
;  5: fatal - 致命错误，程序退出
; 生产环境建议使用0(info)或1(warn)
Level = 0

; Console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
Console = true

; ConsoleLevel: 控制台日志级别
; 可选值同 Level，如果不设置则使用 Level 的值
; 用于实现控制台和文件日志级别分离
; ConsoleLevel = 0

; Filename: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
; 支持占位符：{ServerID} 会被替换为实际的服务器ID
Filename = ./logs/global_server_{ServerID}.log

; MaxSize: 日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
MaxSize = 100

; MaxDays: 日志文件最大保存天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
MaxDays = 15

; MaxBackups: 日志文件最大备份数
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
MaxBackups = 10

; Compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
Compress = true

; ShowCaller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
ShowCaller = true

; Stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为3
Stacktrace = 3

; Sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
Sampling = true

; SamplingInitial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
SamplingInitial = 100

; SamplingThereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
SamplingThereafter = 10

; Async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
Async = true

; AsyncBufferSize: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
AsyncBufferSize = 2048

; AsyncFlushInterval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
AsyncFlushInterval = 50

[Database]
; --------------------------------------------
; 全局数据库配置
; 存储账号和服务器信息
; --------------------------------------------
; Host: 数据库服务器地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
Host = 192.168.91.128

; Port: 数据库端口
; Kubernetes中MySQL服务的NodePort
Port = 3306

; User: 数据库用户名
; 建议使用具有有限权限的专用账号
; 避免使用root账号
User = root

; Password: 数据库密码
; 生产环境请使用强密码
; 建议定期更换密码
Password = 123456

; DBName: 数据库名称
; 全局数据库名称，存储账号和服务器信息
DBName = global

; Charset: 数据库字符集
; 默认utf8mb4，支持完整UTF-8字符（包括emoji）
Charset = utf8mb4

; Driver: 数据库驱动类型
; 当前支持: mysql
; 未来可扩展: postgres, sqlite等
Driver = mysql

; MaxIdle: 最大空闲连接数
; 连接池中保持的最大空闲连接数
; 建议值: 5-50，默认10
MaxIdle = 10

; MaxOpen: 最大打开连接数
; 同时打开的最大连接数
; 建议值: 50-500，默认100
; 注意: 此值不应超过数据库服务器的max_connections设置
MaxOpen = 100

; MaxPoolSize: 连接池最大连接数（MongoDB）
; 根据数据库服务器性能调整
; 建议值: 50-500，默认100
MaxPoolSize = 100

; MinPoolSize: 连接池最小连接数（MongoDB）
; 保持空闲连接以便快速响应
; 建议值: 5-50，默认10
MinPoolSize = 10

; ConnectTimeout: 连接超时时间（秒）
; 连接数据库的最大等待时间
; 建议值: 10-60，默认30秒
ConnectTimeout = 30

[Redis]
; --------------------------------------------
; Redis配置
; 用于存储服务器动态状态信息
; --------------------------------------------
; Host: Redis服务器地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
Host = 192.168.91.128

; Port: Redis端口
; Redis默认端口6379
Port = 6379

; Password: Redis密码
; 如果Redis设置了密码，请填写
; 如果没有密码，留空
Password =

; DB: Redis数据库编号
; Redis支持16个数据库（0-15）
; 默认使用0号数据库
DB = 0

; PoolSize: 连接池大小
; Redis连接池的最大连接数
; 建议值: 10-100，默认10
PoolSize = 10

[Pprof]
; --------------------------------------------
; pprof性能分析配置
; 用于性能调优和问题排查
; --------------------------------------------
; Enabled: 是否启用pprof功能
; true - 启用，可通过web界面查看性能数据
; false - 禁用
; 生产环境建议关闭，仅在需要性能分析时启用
Enabled = false

; ListenAddress: pprof监听地址
; 格式: IP:端口
; 建议绑定到localhost以提高安全性
; 访问方式: http://localhost:6060/debug/pprof/
ListenAddress = localhost:6060

[Metrics]
; --------------------------------------------
; Prometheus监控指标配置
; 用于服务监控和告警
; --------------------------------------------
; Enabled: 是否启用监控指标
; true - 启用，可通过/metrics端点获取指标数据
; false - 禁用
; 生产环境建议启用
Enabled = true

; ListenAddress: 监控指标服务监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; Prometheus将通过此地址抓取指标数据
ListenAddress = 0.0.0.0:8889

[Etcd]
; --------------------------------------------
; Etcd服务发现配置
; --------------------------------------------
; Endpoints: etcd服务端点
; 多个端点用逗号分隔
; 格式: https://IP1:端口,https://IP2:端口
Endpoints = http://192.168.91.128:12379

; Username: etcd用户名
; 如需认证，取消下面注释并设置正确的用户名
; Username = admin

; Password: etcd密码
; 如需认证，取消下面注释并设置正确的密码
; Password = password

; CACertPath: CA证书路径
; 用于验证etcd服务器证书
; 留空表示不使用TLS
CACertPath = 

; ClientCertPath: 客户端证书路径
; 用于etcd服务认证
ClientCertPath = 

; ClientKeyPath: 客户端密钥路径
; 用于etcd服务认证
ClientKeyPath =

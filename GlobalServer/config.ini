; ============================================
; GlobalServer 配置文件
; 全局服务器 - 账号管理和服务器列表维护
; ============================================

[server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; server_id: 服务器唯一标识ID
; 用于区分不同的GlobalServer实例
server_id = 1

; server_name: 服务器名称
; 用于日志和监控显示
server_name = GlobalServer

; worker_id: Snowflake工作机器ID（0-31）
; 用于生成分布式唯一ID
; 多实例部署时每个实例必须不同
worker_id = 1

; datacenter_id: Snowflake数据中心ID（0-31）
; 用于生成分布式唯一ID
; 不同数据中心使用不同ID
datacenter_id = 1

[http]
; --------------------------------------------
; HTTP服务配置
; 提供RESTful API接口
; --------------------------------------------
; listen_address: HTTP服务监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; 生产环境建议绑定具体IP
listen_address = 0.0.0.0:8082

; max_client_count: 最大客户端连接数
; HTTP服务的最大并发连接数
; 建议值: 1000-50000，默认10000
max_client_count = 10000

; max_packet_data_size: 最大数据包大小（字节）
; HTTP请求体的最大大小
; 默认1MB，防止大文件上传攻击
; 建议值: 1048576(1MB) - 10485760(10MB)
max_packet_data_size = 1048576

[log]
; --------------------------------------------
; 日志配置
; 使用zap高性能日志库
; --------------------------------------------
; level: 日志级别
; -1: debug - 调试信息，最详细
;  0: info  - 一般信息，适合生产环境
;  1: warn  - 警告信息
;  2: error - 错误信息
;  3: dpanic - 开发环境panic
;  4: panic - 运行时panic
;  5: fatal - 致命错误，程序退出
; 生产环境建议使用0(info)或1(warn)
level = 0

; console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
console = true

; filename: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
filename = ./logs/server.log

; max-size: 日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
max-size = 100

; max-days: 日志文件最大保存天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
max-days = 15

; max-backups: 日志文件最大备份数
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
max-backups = 10

; compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
compress = true

; show-caller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
show-caller = true

; stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为2
stacktrace = 3

; sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
sampling = true

; sampling-initial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
sampling-initial = 100

; sampling-thereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
sampling-thereafter = 10

; async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
async = true

; async-buffer-size: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
async-buffer-size = 2048

; async-flush-interval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
async-flush-interval = 50

[database.global]
; --------------------------------------------
; 全局数据库配置
; 存储账号和服务器信息
; --------------------------------------------
; host: 数据库服务器地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
host = 192.168.91.128

; port: 数据库端口
; MySQL默认端口3306
port = 3306

; user: 数据库用户名
; 建议使用具有有限权限的专用账号
; 避免使用root账号
user = root

; password: 数据库密码
; 生产环境请使用强密码
; 建议定期更换密码
password = potato

; dbname: 数据库名称
; 全局数据库名称，存储账号和服务器信息
dbname = global

; driver: 数据库驱动类型
; 当前支持: mysql
; 未来可扩展: postgres, sqlite等
driver = mysql

; max_pool_size: 连接池最大连接数
; 根据数据库服务器性能调整
; 建议值: 50-500，默认100
; 注意: 此值不应超过数据库服务器的max_connections设置
max_pool_size = 100

; min_pool_size: 连接池最小连接数
; 保持空闲连接以便快速响应
; 建议值: 5-50，默认10
min_pool_size = 10

; connect_timeout: 连接超时时间（秒）
; 连接数据库的最大等待时间
; 建议值: 10-60，默认30秒
connect_timeout = 30

[pprof]
; --------------------------------------------
; pprof性能分析配置
; 用于性能调优和问题排查
; --------------------------------------------
; enabled: 是否启用pprof功能
; true - 启用，可通过web界面查看性能数据
; false - 禁用
; 生产环境建议关闭，仅在需要性能分析时启用
enabled = false

; listen_address: pprof监听地址
; 格式: IP:端口
; 建议绑定到localhost以提高安全性
; 访问方式: http://localhost:6060/debug/pprof/
listen_address = localhost:6060

; ============================================
; 配置说明和最佳实践
; ============================================
; 
; 1. 生产环境配置建议:
;    - 使用强密码和密钥
;    - 绑定具体IP而不是0.0.0.0
;    - 关闭console日志输出
;    - 关闭show-caller以提高性能
;    - 启用日志采样减少日志量
;    - 关闭pprof功能
;
; 2. 性能调优建议:
;    - 根据CPU核心数调整max_pool_size
;    - 根据内存大小调整async-buffer-size
;    - 根据流量调整max_client_count
;    - 启用日志异步写入
;
; 3. 安全配置建议:
;    - 修改默认密码
;    - 使用SSL/TLS连接数据库
;    - 限制pprof访问IP
;    - 设置合理的max_packet_data_size
;
; 4. 高可用配置建议:
;    - 多实例部署，使用负载均衡
;    - 配置不同的worker_id
;    - 使用数据库主从复制
;    - 配置日志集中收集
;
; 5. 监控告警建议:
;    - 监控HTTP服务状态
;    - 监控数据库连接数
;    - 监控API响应时间
;    - 监控错误日志数量
;
; ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: map-server
  namespace: game
  labels:
    app: map-server
spec:
  replicas: 5
  selector:
    matchLabels:
      app: map-server
  template:
    metadata:
      labels:
        app: map-server
    spec:
      containers:
      - name: map-server
        image: zmmo/map-server:latest
        ports:
        - containerPort: 9002
          name: game
        - containerPort: 9093
          name: metrics
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: SERVER_ID
          value: "$(POD_NAME)"
        - name: ETCD_ENDPOINTS
          value: "etcd-0.etcd:2379,etcd-1.etcd:2379,etcd-2.etcd:2379"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          tcpSocket:
            port: 9002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 9002
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.ini
          subPath: config.ini
      volumes:
      - name: config-volume
        configMap:
          name: map-config
---
apiVersion: v1
kind: Service
metadata:
  name: map-service
  namespace: game
spec:
  selector:
    app: map-server
  ports:
  - name: game
    port: 9002
    targetPort: 9002
  - name: metrics
    port: 9093
    targetPort: 9093
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: map-headless
  namespace: game
spec:
  clusterIP: None
  selector:
    app: map-server
  ports:
  - name: game
    port: 9002
    targetPort: 9002
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: map-hpa
  namespace: game
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: map-server
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

apiVersion: apps/v1
kind: Deployment
metadata:
  name: global-server
  namespace: game
  labels:
    app: global-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: global-server
  template:
    metadata:
      labels:
        app: global-server
    spec:
      containers:
      - name: global-server
        image: zmmo/global-server:latest
        ports:
        - containerPort: 8082
          name: http
        - containerPort: 9094
          name: metrics
        env:
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: SERVER_ID
          value: "$(POD_NAME)"
        - name: ETCD_ENDPOINTS
          value: "etcd-0.etcd:2379,etcd-1.etcd:2379,etcd-2.etcd:2379"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.ini
          subPath: config.ini
      volumes:
      - name: config-volume
        configMap:
          name: global-config
---
apiVersion: v1
kind: Service
metadata:
  name: global-service
  namespace: game
spec:
  selector:
    app: global-server
  ports:
  - name: http
    port: 8082
    targetPort: 8082
  - name: metrics
    port: 9094
    targetPort: 9094
  type: ClusterIP

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: game
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
    - job_name: 'gateway-server'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: gateway-server
        action: keep
      - source_labels: [__meta_kubernetes_pod_port_name]
        regex: metrics
        action: keep

    - job_name: 'game-server'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: game-server
        action: keep
      - source_labels: [__meta_kubernetes_pod_port_name]
        regex: metrics
        action: keep

    - job_name: 'map-server'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: map-server
        action: keep
      - source_labels: [__meta_kubernetes_pod_port_name]
        regex: metrics
        action: keep

    - job_name: 'global-server'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        regex: global-server
        action: keep
      - source_labels: [__meta_kubernetes_pod_port_name]
        regex: metrics
        action: keep

    - job_name: 'kubernetes-nodes'
      kubernetes_sd_configs:
      - role: node
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_node_label_(.+)

    - job_name: 'kubernetes-pods'
      kubernetes_sd_configs:
      - role: pod
      relabel_configs:
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name

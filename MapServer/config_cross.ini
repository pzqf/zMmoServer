; ============================================
; MapServer 配置文件
; 地图服务器（世界地图，多服同进）
; 真实运行配置：config_cross.ini
; ============================================

[Server]
; ServerID: 103 => 000103（Group=0001, Index=03）
ServerID = 103
; ServerName: 服务器名称
ServerName = MapServer-Cross
; GroupID: 逻辑组ID
GroupID = 1
; ListenAddr: 监听地址
ListenAddr = 0.0.0.0:30003
; MaxConnections: 最大连接数
MaxConnections = 10000
; HeartbeatInterval: 心跳间隔（秒）
HeartbeatInterval = 30

[Database]
DBType = mysql
DBHost = 192.168.91.128
DBPort = 30306
DBName = GameDB_000101
DBUser = root
DBPassword = 123456
MaxOpenConns = 100
MaxIdleConns = 10
ConnMaxLifetime = 3600

[GameServer]
GameServerAddr = 127.0.0.1:20002
GameServerConnectTimeout = 10

[Log]
Level = 0
Console = true
Filename = ./logs/server_cross.log
MaxSize = 100
MaxDays = 15
MaxBackups = 10
Compress = true
show-caller = true
stacktrace = 3
sampling = true
sampling-initial = 100
sampling-thereafter = 10
async = true
async-buffer-size = 2048
async-flush-interval = 50

[Etcd]
Endpoints = https://192.168.91.128:2379
CACertPath = ../resources/etcd/ca.crt
ClientCertPath = ../resources/etcd/server.crt
ClientKeyPath = ../resources/etcd/server.key

[Maps]
; 地图类型说明：
; config_single.ini = 单服地图（single_server）
; config_mirror.ini = 镜像地图（mirror）
; config_cross.ini = 世界地图（cross_group，多服同进）
; Mode 与 map.xlsx 的 MapType 强一致
Mode = cross_group
MapIDs = 3001,3002

; ============================================
; MapServer 配置文件
; 地图服务器 - 处理玩家移动和AOI
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerID: 服务器唯一标识ID
ServerID = 1

; ServerName: 服务器名称
ServerName = MapServer

; ListenAddr: 监听地址
ListenAddr = 0.0.0.0:9002

; MaxConnections: 最大连接数
MaxConnections = 10000

; HeartbeatInterval: 心跳间隔（秒）
HeartbeatInterval = 30

[Database]
; --------------------------------------------
; 数据库配置
; --------------------------------------------
; DBType: 数据库类型 (mysql)
DBType = mysql

; DBHost: 数据库主机地址
DBHost = 127.0.0.1

; DBPort: 数据库端口
DBPort = 3306

; DBName: 数据库名称
DBName = MapDB

; DBUser: 数据库用户名
DBUser = root

; DBPassword: 数据库密码
DBPassword = 

; MaxOpenConns: 最大打开连接数
MaxOpenConns = 100

; MaxIdleConns: 最大空闲连接数
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
ConnMaxLifetime = 3600

[GameServer]
; --------------------------------------------
; GameServer连接配置
; --------------------------------------------
; GameServerAddr: GameServer地址
GameServerAddr = 127.0.0.1:9001

; GameServerConnectTimeout: 连接超时（秒）
GameServerConnectTimeout = 10

[Log]
; --------------------------------------------
; 日志配置
; 参考zGameServer的详细日志配置
; --------------------------------------------
; Level: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用info或warn
Level = 0

; Console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
Console = true

; Filename: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
Filename = ./logs/server.log

; MaxSize: 单个日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
MaxSize = 100

; MaxDays: 日志保留天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
MaxDays = 15

; MaxBackups: 最大备份数
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
MaxBackups = 10

; Compress: 是否压缩旧日志
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
Compress = true

; show-caller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
show-caller = true

; stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为2
stacktrace = 3

; sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
sampling = true

; sampling-initial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
sampling-initial = 100

; sampling-thereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
sampling-thereafter = 10

; async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
async = true

; async-buffer-size: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
async-buffer-size = 2048

; async-flush-interval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
async-flush-interval = 50

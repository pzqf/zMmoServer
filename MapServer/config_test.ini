; ============================================
; MapServer 测试配置
; 用于本地/CI测试，语义与正式配置保持一致
; ============================================

[Server]
; ServerID: 6位语义ID（101 => 000101）
ServerID = 101

; ServerName: 服务名（测试环境）
ServerName = MapServer-Test

; GroupID: 分组ID（与ServerID语义一致）
GroupID = 1

; ListenAddr: 监听地址
ListenAddr = 0.0.0.0:30001

; MaxConnections: 最大连接数
MaxConnections = 10000

; HeartbeatInterval: 心跳间隔（秒）
HeartbeatInterval = 30

[Database]
; DBType: 数据库类型
DBType = mysql

; DBHost: 数据库主机地址
DBHost = 192.168.91.128

; DBPort: 数据库端口
DBPort = 30306

; DBName: 数据库名称
DBName = GameDB_000101

; DBUser: 数据库用户名
DBUser = root

; DBPassword: 数据库密码
DBPassword = 123456

; MaxOpenConns: 最大打开连接数
MaxOpenConns = 100

; MaxIdleConns: 最大空闲连接数
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
ConnMaxLifetime = 3600

[GameServer]
; GameServerAddr: GameServer地址
GameServerAddr = 127.0.0.1:20002

; GameServerConnectTimeout: 连接超时（秒）
GameServerConnectTimeout = 10

[Log]
; Level: 日志级别
Level = 0

; Console: 是否输出到控制台
Console = true

; ConsoleLevel: 控制台日志级别
; ConsoleLevel = 0

; Filename: 日志文件路径
Filename = ./logs/map_server_test.log

; MaxSize: 日志文件最大大小（MB）
MaxSize = 100

; MaxDays: 日志文件最大保存天数
MaxDays = 15

; MaxBackups: 日志文件最大备份数
MaxBackups = 10

; Compress: 是否压缩日志文件
Compress = true

; ShowCaller: 显示调用者信息
ShowCaller = true

; Stacktrace: 打印栈跟踪信息深度
Stacktrace = 3

; Sampling: 是否启用采样
Sampling = true

; SamplingInitial: 采样初始数量
SamplingInitial = 100

; SamplingThereafter: 采样后续数量
SamplingThereafter = 10

; Async: 是否启用异步写入
Async = true

; AsyncBufferSize: 异步写入缓冲区大小（条）
AsyncBufferSize = 2048

; AsyncFlushInterval: 异步刷新间隔（毫秒）
AsyncFlushInterval = 50

[Metrics]
; Enabled: 是否启用监控指标
Enabled = true

; ListenAddress: 监控指标服务监听地址
ListenAddress = 0.0.0.0:9093

[Pprof]
; Enabled: 是否启用pprof功能
Enabled = false

; ListenAddress: pprof监听地址
ListenAddress = localhost:6063

[Etcd]
; Endpoints: etcd服务端点
Endpoints = https://192.168.91.128:2379

; CACertPath: CA证书路径
CACertPath = ../resources/etcd/ca.crt

; ClientCertPath: 客户端证书路径
ClientCertPath = ../resources/etcd/server.crt

; ClientKeyPath: 客户端密钥路径
ClientKeyPath = ../resources/etcd/server.key

[Maps]
; Mode: 必须与 map.xlsx 中 MapType 一致
; 可选值：single_server / mirror / cross_group
Mode = single_server

; MapIDs: 测试服负责地图
MapIDs = 1001,1002

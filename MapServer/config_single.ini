; ============================================
; MapServer 配置文件
; 地图服务器（单服地图）
; 真实运行配置：config_single.ini
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerID: 服务器唯一标识ID（6位语义，整数写法）
; 101 => 000101（Group=0001, Index=01）
ServerID = 101

; ServerName: 服务器名称
ServerName = MapServer-Single

; GroupID: 逻辑组ID（需与ServerID语义一致）
GroupID = 1

; ListenAddr: 监听地址
ListenAddr = 0.0.0.0:30001

; MaxConnections: 最大连接数
MaxConnections = 10000

; HeartbeatInterval: 心跳间隔（秒）
HeartbeatInterval = 30

[Database]
; --------------------------------------------
; 数据库配置
; --------------------------------------------
; DBType: 数据库类型 (mysql)
DBType = mysql

; DBHost: 数据库主机地址
DBHost = 192.168.91.128

; DBPort: 数据库端口
DBPort = 30306

; DBName: 数据库名称
DBName = GameDB_000101

; DBUser: 数据库用户名
DBUser = root

; DBPassword: 数据库密码
DBPassword = 123456

; MaxOpenConns: 最大打开连接数
MaxOpenConns = 100

; MaxIdleConns: 最大空闲连接数
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
ConnMaxLifetime = 3600

[GameServer]
; --------------------------------------------
; GameServer连接配置
; --------------------------------------------
; GameServerAddr: GameServer地址
GameServerAddr = 127.0.0.1:20002

; GameServerConnectTimeout: 连接超时（秒）
GameServerConnectTimeout = 10

[Log]
; --------------------------------------------
; 日志配置
; --------------------------------------------
; Level: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
Level = 0

; Console: 是否输出到控制台
Console = true

; Filename: 日志文件路径
Filename = ./logs/server_single.log

; MaxSize: 单个日志文件最大大小（MB）
MaxSize = 100

; MaxDays: 日志保留天数
MaxDays = 15

; MaxBackups: 最大备份数
MaxBackups = 10

; Compress: 是否压缩旧日志
Compress = true

; show-caller: 显示调用者信息
show-caller = true

; stacktrace: 打印栈跟踪信息深度
stacktrace = 3

; sampling: 是否启用采样
sampling = true

; sampling-initial: 采样初始数量
sampling-initial = 100

; sampling-thereafter: 采样后续数量
sampling-thereafter = 10

; async: 是否启用异步写入
async = true

; async-buffer-size: 异步写入缓冲区大小（条）
async-buffer-size = 2048

; async-flush-interval: 异步刷新间隔（毫秒）
async-flush-interval = 50

[Etcd]
; --------------------------------------------
; Etcd服务发现配置
; --------------------------------------------
; Endpoints: etcd服务端点
Endpoints = https://192.168.91.128:2379

; CACertPath: CA证书路径
CACertPath = ../resources/etcd/ca.crt

; ClientCertPath: 客户端证书路径
ClientCertPath = ../resources/etcd/server.crt

; ClientKeyPath: 客户端密钥路径
ClientKeyPath = ../resources/etcd/server.key

[Maps]
; --------------------------------------------
; 地图配置
; --------------------------------------------
; 地图类型说明：
; config_single.ini = 单服地图（single_server）
; config_mirror.ini = 镜像地图（mirror）
; config_cross.ini = 世界地图（cross_group，多服同进）
; Mode: 当前MapServer地图模式（与map.xlsx中的MapType强一致）
; 可选值：single_server / mirror / cross_group
Mode = single_server
; MapIDs: 该MapServer负责的地图ID列表
MapIDs = 1001,1002

; ============================================
; MapServer 配置文件
; 地图服务器（单服地图模式）
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerID: 服务器唯一标识ID（6位语义，整数写法）
; 101 => 000101（Group=0001, Index=01）
ServerID = 101

; ServerName: 服务器名称
ServerName = MapServer-Single

; GroupID: 逻辑组ID（需与ServerID语义一致）
GroupID = 1

; ListenAddr: 监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
ListenAddr = 0.0.0.0:30001

; MaxConnections: 最大连接数
; 根据服务器硬件配置调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; HeartbeatInterval: 心跳间隔（秒）
; 服务器定期发送心跳包检测连接存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

[Database]
; --------------------------------------------
; 数据库配置
; --------------------------------------------
; DBType: 数据库类型
; 当前支持: mysql
DBType = mysql

; DBHost: 数据库主机地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
DBHost = 192.168.91.128

; DBPort: 数据库端口
DBPort = 3306

; DBName: 数据库名称
; 建议格式: GameDB_区服ID
DBName = GameDB_000101

; DBUser: 数据库用户名
DBUser = root

; DBPassword: 数据库密码
; 生产环境请使用强密码
DBPassword = 123456

; MaxOpenConns: 最大打开连接数
; 建议值: 50-500，默认100
MaxOpenConns = 100

; MaxIdleConns: 最大空闲连接数
; 建议值: 5-50，默认10
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
; 建议值: 1800-7200，默认3600
ConnMaxLifetime = 3600

[GameServer]
; --------------------------------------------
; GameServer连接配置
; --------------------------------------------
; GameServerAddr: GameServer地址
; 格式: IP:端口
GameServerAddr = 127.0.0.1:20001

; GameServerConnectTimeout: 连接超时（秒）
; 建议值: 5-30，默认10秒
GameServerConnectTimeout = 10

[Log]
; --------------------------------------------
; 日志配置
; 使用zap高性能日志库
; --------------------------------------------
; Level: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用0(info)或1(warn)
Level = 0

; Console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
Console = true

; ConsoleLevel: 控制台日志级别
; 可选值同 Level，如果不设置则使用 Level 的值
; 用于实现控制台和文件日志级别分离
; ConsoleLevel = 0

; Filename: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
; 支持占位符：{ServerID} 会被替换为实际的服务器ID
Filename = ./logs/map_server_{ServerID}.log

; MaxSize: 日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
MaxSize = 100

; MaxDays: 日志文件最大保存天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
MaxDays = 15

; MaxBackups: 日志文件最大备份数
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
MaxBackups = 10

; Compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
Compress = true

; ShowCaller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
ShowCaller = true

; Stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为3
Stacktrace = 3

; Sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
Sampling = true

; SamplingInitial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
SamplingInitial = 100

; SamplingThereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
SamplingThereafter = 10

; Async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
Async = true

; AsyncBufferSize: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
AsyncBufferSize = 2048

; AsyncFlushInterval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
AsyncFlushInterval = 50

[Metrics]
; --------------------------------------------
; Prometheus监控指标配置
; 用于服务监控和告警
; --------------------------------------------
; Enabled: 是否启用监控指标
; true - 启用，可通过/metrics端点获取指标数据
; false - 禁用
; 生产环境建议启用
Enabled = true

; ListenAddress: 监控指标服务监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; Prometheus将通过此地址抓取指标数据
ListenAddress = 0.0.0.0:9093

[Pprof]
; --------------------------------------------
; pprof性能分析配置
; 用于性能调优和问题排查
; --------------------------------------------
; Enabled: 是否启用pprof功能
; true - 启用，可通过web界面查看性能数据
; false - 禁用
; 生产环境建议关闭，仅在需要性能分析时启用
Enabled = false

; ListenAddress: pprof监听地址
; 格式: IP:端口
; 建议绑定到localhost以提高安全性
; 访问方式: http://localhost:6063/debug/pprof/
ListenAddress = localhost:6063

[Etcd]
; --------------------------------------------
; Etcd服务发现配置
; --------------------------------------------
; Endpoints: etcd服务端点
; 多个端点用逗号分隔
; 格式: https://IP1:端口,https://IP2:端口
Endpoints = http://192.168.91.128:12379

; Username: etcd用户名
; 如需认证，取消下面注释并设置正确的用户名
; Username = admin

; Password: etcd密码
; 如需认证，取消下面注释并设置正确的密码
; Password = password

; CACertPath: CA证书路径
; 用于验证etcd服务器证书
; 留空表示不使用TLS
CACertPath = 

; ClientCertPath: 客户端证书路径
; 用于etcd服务认证
ClientCertPath = 

; ClientKeyPath: 客户端密钥路径
; 用于etcd服务认证
ClientKeyPath =

[Maps]
; --------------------------------------------
; 地图配置
; --------------------------------------------
; 地图类型说明：
; config_single.ini = 单服地图（single_server）
; config_mirror.ini = 镜像地图（mirror）
; config_cross.ini = 世界地图（cross_group，多服同进）
; Mode: 当前MapServer地图模式（与map.xlsx中的MapType强一致）
; 可选值：single_server / mirror / cross_group
Mode = single_server

; MapIDs: 该MapServer负责的地图ID列表
; 多个ID用逗号分隔
MapIDs = 1001,1002

; ============================================
; MapServer 配置文件
; 地图服务器（镜像地图模式）
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerID: 服务器唯一标识ID（6位语义，整数写法）
; 102 => 000102（Group=0001, Index=02）
ServerID = 102

; ServerName: 服务器名称
ServerName = MapServer-Mirror

; GroupID: 逻辑组ID（需与ServerID语义一致）
GroupID = 1

; ListenAddr: 监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
ListenAddr = 0.0.0.0:30002

; MaxConnections: 最大连接数
; 根据服务器硬件配置调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; HeartbeatInterval: 心跳间隔（秒）
; 服务器定期发送心跳包检测连接存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

[Database]
; --------------------------------------------
; 数据库配置
; --------------------------------------------
; DBType: 数据库类型
; 当前支持: mysql
DBType = mysql

; DBHost: 数据库主机地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
DBHost = 192.168.91.128

; DBPort: 数据库端口
DBPort = 30306

; DBName: 数据库名称
; 建议格式: GameDB_区服ID
DBName = GameDB_000101

; DBUser: 数据库用户名
DBUser = root

; DBPassword: 数据库密码
; 生产环境请使用强密码
DBPassword = 123456

; MaxOpenConns: 最大打开连接数
; 建议值: 50-500，默认100
MaxOpenConns = 100

; MaxIdleConns: 最大空闲连接数
; 建议值: 5-50，默认10
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
; 建议值: 1800-7200，默认3600
ConnMaxLifetime = 3600

[GameServer]
; --------------------------------------------
; GameServer连接配置
; --------------------------------------------
; GameServerAddr: GameServer地址
; 格式: IP:端口
GameServerAddr = 127.0.0.1:20002

; GameServerConnectTimeout: 连接超时（秒）
; 建议值: 5-30，默认10秒
GameServerConnectTimeout = 10

[Log]
; --------------------------------------------
; 日志配置
; 使用zap高性能日志库
; --------------------------------------------
; Level: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用0(info)或1(warn)
Level = 0

; Console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
Console = true

; ConsoleLevel: 控制台日志级别
; 可选值同 Level，如果不设置则使用 Level 的值
; ConsoleLevel = 0

; Filename: 日志文件路径
; 支持占位符：{ServerID} 会被替换为实际的服务器ID
Filename = ./logs/map_server_{ServerID}.log

; MaxSize: 日志文件最大大小（MB）
MaxSize = 100

; MaxDays: 日志文件最大保存天数
MaxDays = 15

; MaxBackups: 日志文件最大备份数
MaxBackups = 10

; Compress: 是否压缩日志文件
Compress = true

; ShowCaller: 显示调用者信息
ShowCaller = true

; Stacktrace: 打印栈跟踪信息深度
Stacktrace = 3

; Sampling: 是否启用采样
Sampling = true

; SamplingInitial: 采样初始数量
SamplingInitial = 100

; SamplingThereafter: 采样后续数量
SamplingThereafter = 10

; Async: 是否启用异步写入
Async = true

; AsyncBufferSize: 异步写入缓冲区大小（条）
AsyncBufferSize = 2048

; AsyncFlushInterval: 异步刷新间隔（毫秒）
AsyncFlushInterval = 50

[Metrics]
; --------------------------------------------
; Prometheus监控指标配置
; --------------------------------------------
; Enabled: 是否启用监控指标
Enabled = true

; ListenAddress: 监控指标服务监听地址
ListenAddress = 0.0.0.0:9093

[Pprof]
; --------------------------------------------
; pprof性能分析配置
; --------------------------------------------
; Enabled: 是否启用pprof功能
Enabled = false

; ListenAddress: pprof监听地址
ListenAddress = localhost:6063

[Etcd]
; --------------------------------------------
; Etcd服务发现配置
; --------------------------------------------
; Endpoints: etcd服务端点
; 多个端点用逗号分隔
Endpoints = https://192.168.91.128:2379

; Username: etcd用户名
; Username = admin

; Password: etcd密码
; Password = password

; CACertPath: CA证书路径
CACertPath = ../resources/etcd/ca.crt

; ClientCertPath: 客户端证书路径
ClientCertPath = ../resources/etcd/server.crt

; ClientKeyPath: 客户端密钥路径
ClientKeyPath = ../resources/etcd/server.key

[Maps]
; --------------------------------------------
; 地图配置
; --------------------------------------------
; 地图类型说明：
; config_single.ini = 单服地图（single_server）
; config_mirror.ini = 镜像地图（mirror）
; config_cross.ini = 世界地图（cross_group，多服同进）
; Mode: 当前MapServer地图模式（与map.xlsx中的MapType强一致）
; 可选值：single_server / mirror / cross_group
Mode = mirror

; MapIDs: 该MapServer负责的地图ID列表
; 多个ID用逗号分隔
MapIDs = 2001,2002

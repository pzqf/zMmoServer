; ============================================
; AdminServer 配置文件
; 管理服务器 - 服务器监控和告警管理
; ============================================

[server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; server_id: 服务器唯一标识ID
; 用于区分不同的AdminServer实例
server_id = 1

; server_name: 服务器名称
; 用于日志和监控显示
server_name = AdminServer

; worker_id: Snowflake工作机器ID（0-31）
; 用于生成分布式唯一ID
; 多实例部署时每个实例必须不同
worker_id = 1

; datacenter_id: Snowflake数据中心ID（0-31）
; 用于生成分布式唯一ID
; 不同数据中心使用不同ID
datacenter_id = 1

[log]
; --------------------------------------------
; 日志配置
; 使用zap高性能日志库
; --------------------------------------------
; level: 日志级别
; -1: debug - 调试信息，最详细
;  0: info  - 一般信息，适合生产环境
;  1: warn  - 警告信息
;  2: error - 错误信息
;  3: dpanic - 开发环境panic
;  4: panic - 运行时panic
;  5: fatal - 致命错误，程序退出
; 生产环境建议使用0(info)或1(warn)
level = 0

; console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
console = true

; filename: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
filename = ./logs/server.log

; max-size: 日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
max-size = 100

; max-days: 日志文件最大保存天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
max-days = 15

; max-backups: 日志文件最大备份数
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
max-backups = 10

; compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
compress = true

; show-caller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
show-caller = true

; stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为2
stacktrace = 3

; sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
sampling = true

; sampling-initial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
sampling-initial = 100

; sampling-thereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
sampling-thereafter = 10

; async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
async = true

; async-buffer-size: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
async-buffer-size = 2048

; async-flush-interval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
async-flush-interval = 50

[monitor]
; --------------------------------------------
; 监控配置
; 服务器状态监控和告警管理
; --------------------------------------------
; http_listen_address: HTTP监控服务监听地址
; 格式: IP:端口
; 提供监控API和Web界面
http_listen_address = 0.0.0.0:8083

; alert_enabled: 是否启用告警功能
; true - 启用告警，当服务器状态异常时发送告警
; false - 禁用告警
alert_enabled = true

; alert_threshold: 告警阈值（百分比）
; 当服务器资源使用率超过此值时触发告警
; 建议值: 80-95，默认90%
alert_threshold = 90

; ============================================
; 配置说明和最佳实践
; ============================================
; 
; 1. 生产环境配置建议:
;    - 使用强密码和密钥
;    - 绑定具体IP而不是0.0.0.0
;    - 关闭console日志输出
;    - 关闭show-caller以提高性能
;    - 启用日志采样减少日志量
;
; 2. 性能调优建议:
;    - 根据CPU核心数调整监控采样频率
;    - 根据内存大小调整async-buffer-size
;    - 根据服务器数量调整监控数据保留时间
;    - 启用日志异步写入
;
; 3. 安全配置建议:
;    - 限制监控API访问IP
;    - 使用HTTPS加密监控数据传输
;    - 设置合理的告警阈值
;    - 定期备份监控数据
;
; 4. 高可用配置建议:
;    - 多实例部署，使用负载均衡
;    - 配置不同的worker_id
;    - 使用外部存储保存监控数据
;    - 配置告警通知渠道（邮件、短信等）
;
; 5. 监控告警建议:
;    - 监控所有服务器的状态
;    - 设置合理的告警阈值
;    - 配置多渠道告警通知
;    - 定期检查告警规则的有效性
;
; ============================================

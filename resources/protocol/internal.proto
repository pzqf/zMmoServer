syntax = "proto3";

package protocol;

option go_package = "./;protocol";

// ============================================
// 服务间通信协议
// ============================================

// 服务间消息ID
enum InternalMsgId {
  MSG_INTERNAL_INVALID = 0;

  // 服务注册相关 100-199
  MSG_INTERNAL_SERVICE_REGISTER = 100;
  MSG_INTERNAL_SERVICE_DEREGISTER = 101;
  MSG_INTERNAL_SERVICE_HEARTBEAT = 102;
  MSG_INTERNAL_SERVICE_DISCOVER = 103;

  // 网关路由相关 200-299
  MSG_INTERNAL_GATEWAY_ROUTE = 200;
  MSG_INTERNAL_GATEWAY_BROADCAST = 201;
  MSG_INTERNAL_GATEWAY_KICK = 202;

  // 玩家路由相关 300-399
  MSG_INTERNAL_PLAYER_ROUTE = 300;
  MSG_INTERNAL_PLAYER_BIND_SERVER = 301;
  MSG_INTERNAL_PLAYER_UNBIND_SERVER = 302;
  MSG_INTERNAL_PLAYER_TRANSFER = 303;

  // 地图服务间通信 400-499
  MSG_INTERNAL_MAP_ENTER_REQUEST = 400;
  MSG_INTERNAL_MAP_ENTER_RESPONSE = 401;
  MSG_INTERNAL_MAP_LEAVE_REQUEST = 402;
  MSG_INTERNAL_MAP_LEAVE_RESPONSE = 403;
  MSG_INTERNAL_MAP_MOVE_REQUEST = 404;
  MSG_INTERNAL_MAP_MOVE_SYNC = 405;
  MSG_INTERNAL_MAP_ATTACK_REQUEST = 406;
  MSG_INTERNAL_COMBAT_ACTION = 407;

  // 跨服相关 600-699
  MSG_INTERNAL_CROSS_SERVER_REQUEST = 600;
  MSG_INTERNAL_CROSS_SERVER_RESPONSE = 601;
}

// 服务类型
enum ServiceType {
  SERVICE_TYPE_INVALID = 0;
  SERVICE_TYPE_GLOBAL = 1;
  SERVICE_TYPE_GATEWAY = 2;
  SERVICE_TYPE_GAME = 3;
  SERVICE_TYPE_MAP = 4;
  SERVICE_TYPE_ADMIN = 5;
}

// 服务信息
message ServiceInfo {
  int32 server_id = 1;
  ServiceType service_type = 2;
  string service_name = 3;
  string address = 4;
  int32 port = 5;
  int32 group_id = 6;
  int32 online_count = 7;
  int32 max_online = 8;
  int32 status = 9;
  int64 register_time = 10;
  int64 last_heartbeat = 11;
  map<string, string> metadata = 12;
}

// 服务注册请求
message ServiceRegisterRequest {
  ServiceInfo service = 1;
}

// 服务注册响应
message ServiceRegisterResponse {
  bool success = 1;
  string error_msg = 2;
}

// 服务注销请求
message ServiceDeregisterRequest {
  int32 server_id = 1;
  ServiceType service_type = 2;
}

// 服务心跳请求
message ServiceHeartbeatRequest {
  int32 server_id = 1;
  ServiceType service_type = 2;
  int32 online_count = 3;
  int32 status = 4;
  float load = 5;
  string external_ip = 6;
  int32 external_port = 7;
  string version = 8;
}

// 服务发现请求
message ServiceDiscoverRequest {
  ServiceType service_type = 1;
  int32 group_id = 2;
}

// 服务发现响应
message ServiceDiscoverResponse {
  bool success = 1;
  string error_msg = 2;
  repeated ServiceInfo services = 3;
}

// 网关路由消息（Gateway转发到GameServer/MapServer）
message GatewayRouteMessage {
  int64 session_id = 1;
  int64 player_id = 2;
  int32 msg_id = 3;
  bytes data = 4;
  int64 timestamp = 5;
}

// 网关广播消息
message GatewayBroadcastMessage {
  repeated int64 session_ids = 1;
  repeated int64 player_ids = 2;
  int32 msg_id = 3;
  bytes data = 4;
}

// 网关踢人请求
message GatewayKickRequest {
  int64 session_id = 1;
  int64 player_id = 2;
  int32 reason = 3;
  string message = 4;
}

// 玩家路由信息
message PlayerRouteInfo {
  int64 player_id = 1;
  int64 session_id = 2;
  int64 account_id = 3;
  int32 game_server_id = 4;
  int32 map_server_id = 5;
  int64 current_map_id = 6;
}

// 玩家绑定服务器请求
message PlayerBindServerRequest {
  int64 player_id = 1;
  int64 session_id = 2;
  int32 game_server_id = 3;
  int32 map_server_id = 4;
}

// 玩家绑定服务器响应
message PlayerBindServerResponse {
  bool success = 1;
  string error_msg = 2;
  PlayerRouteInfo route_info = 3;
}

// 玩家解绑服务器请求
message PlayerUnbindServerRequest {
  int64 player_id = 1;
  int32 game_server_id = 2;
  int32 map_server_id = 3;
}

// 玩家转移请求
message PlayerTransferRequest {
  int64 player_id = 1;
  int32 from_server_id = 2;
  int32 to_server_id = 3;
  bytes player_data = 4;
}

// 玩家转移响应
message PlayerTransferResponse {
  bool success = 1;
  string error_msg = 2;
}

// 跨服请求
message CrossServerRequest {
  int64 request_id = 1;
  int32 from_server_id = 2;
  int32 to_server_id = 3;
  int32 msg_id = 4;
  bytes data = 5;
  int64 timestamp = 6;
}

// 跨服响应
message CrossServerResponse {
  int64 request_id = 1;
  int32 from_server_id = 2;
  int32 to_server_id = 3;
  bool success = 4;
  string error_msg = 5;
  bytes data = 6;
}

// 跨服消息包装
message CrossServerMessage {
  uint64 trace_id = 1;
  uint32 from_server_id = 2;
  uint32 to_server_id = 3;
  uint32 from_service = 4;
  uint32 to_service = 5;
  BaseMessage message = 6;
}

// 基础消息结构
message BaseMessage {
  uint64 session_id = 1;
  uint64 player_id = 2;
  uint64 timestamp = 3;
  uint32 msg_id = 4;
  uint32 server_id = 5;
  uint32 map_id = 6;
  uint32 map_server_id = 7;
  bytes data = 8;
}

// 内部消息包装
message InternalMessage {
  int32 msg_id = 1;
  bytes data = 2;
  int64 timestamp = 3;
  int32 source_server_id = 4;
  int32 target_server_id = 5;
}

// ============================================
// 地图服务间通信协议 (GameServer <-> MapServer)
// ============================================

// 地图进入请求
message MapEnterRequest {
  int64 player_id = 1;
  int64 map_id = 2;
  float x = 3;
  float y = 4;
  float z = 5;
}

// 地图进入响应
message MapEnterResponse {
  bool success = 1;
  string error_msg = 2;
  int64 object_id = 3;
  int64 map_id = 4;
  float x = 5;
  float y = 6;
  float z = 7;
}

// 地图离开请求
message MapLeaveRequest {
  int64 player_id = 1;
  int64 map_id = 2;
  int32 reason = 3;
}

// 地图离开响应
message MapLeaveResponse {
  bool success = 1;
  string error_msg = 2;
  int64 player_id = 3;
}

// 地图移动请求
message MapMoveRequest {
  int64 player_id = 1;
  int64 object_id = 2;
  int64 map_id = 3;
  float x = 4;
  float y = 5;
  float z = 6;
}

// 地图移动响应
message MapMoveResponse {
  bool success = 1;
  string error_msg = 2;
  int64 player_id = 3;
  float x = 4;
  float y = 5;
  float z = 6;
}

// 地图攻击请求
message MapAttackRequest {
  int64 player_id = 1;
  int64 object_id = 2;
  int64 map_id = 3;
  int64 target_id = 4;
}

// 地图攻击响应
message MapAttackResponse {
  bool success = 1;
  string error_msg = 2;
  int64 player_id = 3;
  int64 target_id = 4;
  int64 damage = 5;
  int64 target_hp = 6;
}

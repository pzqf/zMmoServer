syntax = "proto3";

package protocol;

option go_package = "./;protocol";

import "common.proto";

// ============================================
// 游戏逻辑协议
// ============================================

// ============================================
// 消息ID定义
// ============================================

// 系统消息 1-99
enum SystemMsgId {
  MSG_SYSTEM_INVALID = 0;
  MSG_SYSTEM_HEARTBEAT = 1;
  MSG_SYSTEM_PING = 2;
  MSG_SYSTEM_PONG = 3;
  MSG_SYSTEM_KICK = 4;
  MSG_SYSTEM_MAINTENANCE = 5;
}

// 玩家消息 200-299
enum PlayerMsgId {
  MSG_PLAYER_INVALID = 0;
  MSG_PLAYER_CREATE = 200;
  MSG_PLAYER_CREATE_RESPONSE = 201;
  MSG_PLAYER_ENTER_GAME = 202;
  MSG_PLAYER_ENTER_GAME_RESPONSE = 203;
  MSG_PLAYER_LEAVE_GAME = 204;
}

// 地图消息 1200-1299
enum MapMsgId {
  MSG_MAP_INVALID = 0;
  MSG_MAP_ENTER = 1200;
  MSG_MAP_ENTER_RESPONSE = 1201;
  MSG_MAP_LEAVE = 1202;
  MSG_MAP_LEAVE_RESPONSE = 1203;
  MSG_MAP_MOVE = 1204;
  MSG_MAP_MOVE_RESPONSE = 1205;
  MSG_MAP_ATTACK = 1206;
  MSG_MAP_ATTACK_RESPONSE = 1207;
}

// ============================================
// 基础消息结构
// ============================================

// 客户端到服务器的消息头
message ClientMessage {
  uint32 msg_id = 1;
  int64 player_id = 2;
  int64 session_id = 3;
  bytes data = 4;
  int64 timestamp = 5;
  string token = 6;
}

// 服务器到客户端的消息头
message ServerMessage {
  uint32 msg_id = 1;
  int32 result = 2;
  string error_msg = 3;
  bytes data = 4;
  int64 timestamp = 5;
}

// 心跳请求
message HeartbeatRequest {
  int64 client_time = 1;
}

// 心跳响应
message HeartbeatResponse {
  int64 client_time = 1;
  int64 server_time = 2;
}

// ============================================
// 地图相关结构
// ============================================

// 进入地图请求
message ClientMapEnterRequest {
  int64 player_id = 1;
  int32 map_id = 2;
}

// 进入地图响应
message ClientMapEnterResponse {
  int32 result = 1;
  string error_msg = 2;
  int32 map_id = 3;
  Position pos = 4;
}

// 地图移动请求
message ClientMapMoveRequest {
  int64 player_id = 1;
  int32 map_id = 2;
  Position pos = 3;
}

// 地图移动响应
message ClientMapMoveResponse {
  int32 result = 1;
  Position pos = 2;
}

// 离开地图请求
message ClientMapLeaveRequest {
  int64 player_id = 1;
  int32 map_id = 2;
}

// 离开地图响应
message ClientMapLeaveResponse {
  int32 result = 1;
  string error_msg = 2;
}

// 地图攻击请求
message ClientMapAttackRequest {
  int64 player_id = 1;
  int32 map_id = 2;
  int64 target_id = 3;
}

// 地图攻击响应
message ClientMapAttackResponse {
  int32 result = 1;
  int64 target_id = 2;
  int64 damage = 3;
  int64 target_hp = 4;
}

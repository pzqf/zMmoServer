// ============================================
// 基础消息结构
// ============================================

// 客户端到服务器的消息头
message ClientMessage {
  uint32 msg_id = 1;
  int64 player_id = 2;
  int64 session_id = 3;
  bytes data = 4;
  int64 timestamp = 5;
  string token = 6;
}

// 服务器到客户端的消息头
message ServerMessage {
  uint32 msg_id = 1;
  int32 result = 2;
  string error_msg = 3;
  bytes data = 4;
  int64 timestamp = 5;
}

// 心跳请求
message HeartbeatRequest {
  int64 client_time = 1;
}

// 心跳响应
message HeartbeatResponse {
  int64 client_time = 1;
  int64 server_time = 2;
}

// ============================================
// 物品相关结构
// ============================================

// 物品信息
message ItemInfo {
  int64 item_id = 1;
  int32 config_id = 2;
  int32 count = 3;
  int32 level = 4;
  int32 quality = 5;
  int32 bind_type = 6;
  int32 position = 7;
  repeated ItemAttribute attributes = 8;
}

// 物品属性
message ItemAttribute {
  int32 attr_id = 1;
  int64 attr_value = 2;
}

// ============================================
// 技能相关结构
// ============================================

// 技能信息
message SkillInfo {
  int32 skill_id = 1;
  int32 level = 2;
  int32 exp = 3;
  int64 cooldown_end_time = 4;
}

// 技能释放请求
message SkillCastRequest {
  int32 skill_id = 1;
  int64 target_id = 2;
  Position target_pos = 3;
  int32 target_type = 4;
}

// 技能释放结果
message SkillCastResult {
  int32 skill_id = 1;
  int64 caster_id = 2;
  int32 result = 3;
  repeated SkillEffect effects = 4;
}

// 技能效果
message SkillEffect {
  int32 effect_type = 1;
  int64 target_id = 2;
  int64 value = 3;
  Position pos = 4;
}

// ============================================
// 地图相关结构
// ============================================

// 地图对象
message MapObject {
  int64 object_id = 1;
  int32 object_type = 2;  // 1=玩家, 2=NPC, 3=怪物, 4=道具
  string name = 3;
  Position pos = 4;
  int32 level = 5;
  int64 hp = 6;
  int64 max_hp = 7;
  int32 status = 8;
}

// 移动请求
message MoveRequest {
  Position target_pos = 1;
  int32 move_type = 2;  // 1=步行, 2=跑步, 3=传送
  repeated Position path = 3;
}

// 移动响应/通知
message MoveNotify {
  int64 object_id = 1;
  Position pos = 2;
  int32 move_type = 3;
  int64 timestamp = 4;
}

// ============================================
// 地图相关结构
// ============================================

// 进入地图请求
message ClientMapEnterRequest {
  int64 player_id = 1;
  int32 map_id = 2;
}

// 进入地图响应
message ClientMapEnterResponse {
  int32 result = 1;
  string error_msg = 2;
  int32 map_id = 3;
  Position pos = 4;
}

// 地图移动请求
message ClientMapMoveRequest {
  int64 player_id = 1;
  int32 map_id = 2;
  Position pos = 3;
}

// 地图移动响应
message ClientMapMoveResponse {
  int32 result = 1;
  Position pos = 2;
}

// 地图攻击请求
message ClientMapAttackRequest {
  int64 player_id = 1;
  int32 map_id = 2;
  int64 target_id = 3;
}

// 地图攻击响应
message ClientMapAttackResponse {
  int32 result = 1;
  int64 target_id = 2;
  int64 damage = 3;
  int64 target_hp = 4;
}

// ============================================
// 战斗相关结构
// ============================================

// 攻击请求
message AttackRequest {
  int64 target_id = 1;
  int32 attack_type = 2;  // 1=普通攻击, 2=技能攻击
  int32 skill_id = 3;
}

// 伤害信息
message DamageInfo {
  int64 attacker_id = 1;
  int64 target_id = 2;
  int64 damage = 3;
  int32 damage_type = 4;  // 1=物理, 2=魔法, 3=真实
  bool is_critical = 5;
  bool is_miss = 6;
}

// Buff信息
message BuffInfo {
  int32 buff_id = 1;
  int64 caster_id = 2;
  int64 target_id = 3;
  int64 start_time = 4;
  int64 end_time = 5;
  int32 layer = 6;
}

// ============================================
// 聊天相关结构
// ============================================

// 聊天消息
message ChatMessage {
  int32 channel = 1;  // 1=附近, 2=地图, 3=世界, 4=公会, 5=队伍, 6=私聊
  int64 sender_id = 2;
  string sender_name = 3;
  string content = 4;
  int64 timestamp = 5;
  int64 target_id = 6;  // 私聊目标
}

// 发送聊天请求
message ChatSendRequest {
  int32 channel = 1;
  string content = 2;
  int64 target_id = 3;
}

// ============================================
// 邮件相关结构
// ============================================

// 邮件信息
message MailInfo {
  int64 mail_id = 1;
  string title = 2;
  string content = 3;
  int64 sender_id = 4;
  string sender_name = 5;
  int64 send_time = 6;
  bool is_read = 7;
  bool has_attachment = 8;
  repeated ItemInfo attachments = 9;
}

// ============================================
// 任务相关结构
// ============================================

// 任务信息
message TaskInfo {
  int32 task_id = 1;
  int32 status = 2;  // 1=未接受, 2=进行中, 3=可完成, 4=已完成
  int32 progress = 3;
  int32 target_progress = 4;
  int64 accept_time = 5;
  int64 complete_time = 6;
  repeated ItemInfo rewards = 7;
}

// ============================================
// 公会相关结构
// ============================================

// 公会信息
message GuildInfo {
  int64 guild_id = 1;
  string name = 2;
  int64 leader_id = 3;
  string leader_name = 4;
  int32 level = 5;
  int32 member_count = 6;
  int32 max_member_count = 7;
  string notice = 8;
  int64 create_time = 9;
}

// 公会成员
message GuildMember {
  int64 player_id = 1;
  string name = 2;
  int32 level = 3;
  int32 position = 4;  // 1=会长, 2=副会长, 3=精英, 4=普通
  int64 join_time = 5;
  int64 last_login_time = 6;
}

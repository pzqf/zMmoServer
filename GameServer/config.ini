; ============================================
; GameServer 配置文件
; 游戏服务器 - 处理游戏逻辑和玩家数据
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerName: 服务器名称，用于日志和监控显示
; 建议格式: GameServer_区服ID
ServerName = GameServer

; ServerID: 服务器唯一标识ID
; 用于区分不同的GameServer实例，多服部署时需要唯一
; 此ID也用于数据库分库分表
ServerID = 1

; GroupID: 服务器分组ID
; 用于服务器分组，同组服务器共享某些资源
; 建议值: 1-15，默认1
GroupID = 1

; ListenAddr: Gateway连接监听地址
; 格式: IP:端口
; Gateway将通过此地址连接到GameServer
; 0.0.0.0 表示监听所有网卡
ListenAddr = 0.0.0.0:9001

; MaxConnections: 最大连接数（来自Gateway的连接）
; 根据服务器硬件配置和预期玩家数量调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; ConnectionTimeout: 连接超时时间（秒）
; 超过此时间无数据交互则断开与Gateway的连接
; 建议值: 60-600，默认300（5分钟）
ConnectionTimeout = 300

; HeartbeatInterval: 心跳检测间隔（秒）
; 服务器定期发送心跳包检测Gateway连接存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

[Database]
; --------------------------------------------
; 数据库配置
; 用于玩家数据持久化存储
; --------------------------------------------
; DBType: 数据库类型
; 当前支持: mysql
; 未来可扩展: postgres, sqlite等
DBType = mysql

; DBHost: 数据库服务器地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
DBHost = 127.0.0.1

; DBPort: 数据库端口
; MySQL默认端口3306
DBPort = 3306

; DBName: 数据库名称
; 建议格式: GameDB_区服ID
; 例如: GameDB_000101 表示1区1服
DBName = GameDB_000101

; DBUser: 数据库用户名
; 建议使用具有有限权限的专用账号
; 避免使用root账号
DBUser = root

; DBPassword: 数据库密码
; 生产环境请使用强密码
; 建议定期更换密码
DBPassword = root

; MaxOpenConns: 数据库最大连接数
; 根据数据库服务器性能调整
; 建议值: 50-500，默认100
; 注意: 此值不应超过数据库服务器的max_connections设置
MaxOpenConns = 100

; MaxIdleConns: 数据库最大空闲连接数
; 保持空闲连接以便快速响应
; 建议值: 5-50，默认10
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
; 超过此时间的连接将被关闭
; 建议值: 1800-7200，默认3600秒（1小时）
; 设置为0表示不限制，但不推荐
ConnMaxLifetime = 3600

[Gateway]
; --------------------------------------------
; Gateway服务器配置
; GameServer需要连接到Gateway进行通信
; --------------------------------------------
; GatewayAddr: Gateway服务器地址
; 格式: IP:端口
; GameServer将主动连接到此地址
GatewayAddr = 127.0.0.1:8081

; GatewayConnectTimeout: 连接Gateway超时时间（秒）
; 连接Gateway的最大等待时间
; 建议值: 5-30，默认10秒
GatewayConnectTimeout = 10

[GlobalServer]
; --------------------------------------------
; GlobalServer服务器配置
; GameServer需要向GlobalServer注册
; --------------------------------------------
; GlobalServerAddr: GlobalServer服务器地址
; 格式: IP:端口
; GameServer将向此地址注册
GlobalServerAddr = 127.0.0.1:8082

; RegisterInterval: 注册间隔（秒）
; GameServer定期向GlobalServer注册
; 建议值: 10-60，默认30秒
RegisterInterval = 30

[Logging]
; --------------------------------------------
; 日志配置
; 参考zGameServer的详细日志配置
; --------------------------------------------
; LogLevel: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用info或warn
LogLevel = 0

; console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
console = true

; LogFile: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
; 建议按日期分割日志文件
LogFile = logs/server.log

; LogMaxSize: 单个日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
; 注意: 设置过大可能导致日志文件难以处理
LogMaxSize = 100

; LogMaxBackups: 日志文件保留数量
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
LogMaxBackups = 10

; LogMaxAge: 日志文件保留天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
; 根据磁盘空间和审计要求调整
LogMaxAge = 15

; compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
compress = true

; show-caller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
show-caller = true

; stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为2
stacktrace = 3

; sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
sampling = true

; sampling-initial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
sampling-initial = 100

; sampling-thereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
sampling-thereafter = 10

; async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
async = true

; async-buffer-size: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
async-buffer-size = 2048

; async-flush-interval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
async-flush-interval = 50

[Metrics]
; --------------------------------------------
; 监控指标配置
; 用于性能监控和运维管理
; --------------------------------------------
; Enabled: 是否启用监控服务
; true - 启用，false - 禁用
; 生产环境强烈建议启用以便监控服务器状态
; 监控指标包括: 在线人数、QPS、延迟、内存使用等
Enabled = true

; MetricsAddr: 监控服务监听地址
; 格式: IP:端口
; 用于Prometheus等监控系统采集指标
; 建议绑定到内网地址或localhost以提高安全性
MetricsAddr = 0.0.0.0:9092

; ============================================
; 配置说明和最佳实践
; ============================================
; 
; 1. 生产环境配置建议:
;    - 使用强密码和密钥
;    - 绑定具体IP而不是0.0.0.0
;    - 启用监控和日志
;    - 调整连接池大小
;    - 设置合理的超时时间
;
; 2. 性能调优建议:
;    - 根据CPU核心数调整MaxOpenConns
;    - 根据内存大小调整缓存配置
;    - 根据网络状况调整超时时间
;    - 根据玩家数量调整MaxConnections
;
; 3. 安全配置建议:
;    - 修改默认密码
;    - 使用SSL/TLS连接数据库
;    - 限制监控服务访问IP
;    - 定期轮换密钥
;
; 4. 多服部署配置:
;    - 每个GameServer使用唯一的ServerID
;    - 每个GameServer使用独立的数据库
;    - GatewayAddr指向对应的Gateway
;    - 监控端口避免冲突
;
; ============================================

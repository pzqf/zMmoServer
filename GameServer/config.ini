; ============================================
; GameServer 配置文件
; 游戏服务器 - 处理游戏逻辑和玩家数据
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerName: 服务器名称，用于日志和监控显示
; 建议格式: GameServer_区服ID
ServerName = GameServer

; ServerID: 服务器唯一标识ID
; 用于区分不同的GameServer实例，多服部署时需要唯一
; 此ID也用于数据库分库分表
ServerID = 101

; GroupID: 服务器分组ID
; 用于服务器分组，同组服务器共享某些资源
; 建议值: 1-15，默认1
GroupID = 1

; ListenAddr: Gateway连接监听地址
; 格式: IP:端口
; Gateway将通过此地址连接到GameServer
; 0.0.0.0 表示监听所有网卡
ListenAddr = 0.0.0.0:20001

; ExternalAddr: 外网访问地址
; 格式: IP:端口 或 域名:端口
; 如果不配置，默认使用ListenAddr
; ExternalAddr =

; MaxConnections: 最大连接数（来自Gateway的连接）
; 根据服务器硬件配置和预期玩家数量调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; ConnectionTimeout: 连接超时时间（秒）
; 超过此时间无数据交互则断开与Gateway的连接
; 建议值: 60-600，默认300（5分钟）
ConnectionTimeout = 300

; HeartbeatInterval: 心跳检测间隔（秒）
; 服务器定期发送心跳包检测Gateway连接存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

; UseWorkerPool: 是否使用工作池模式
; true - 启用工作池，提高并发处理能力
; false - 禁用工作池，每个连接使用单独的goroutine
UseWorkerPool = false

; WorkerPoolSize: 工作池大小
; 处理客户端消息的工作线程数
; 建议值: 50-500，根据CPU核心数调整
; 一般设置为CPU核心数的2-4倍
WorkerPoolSize = 10

; WorkerQueueSize: 工作队列大小
; 每个工作线程的消息队列大小
; 建议值: 1000-50000，默认10000
WorkerQueueSize = 1000

; ChanSize: 通道大小
; 内部通信通道的缓冲区大小
; 建议值: 128-4096，默认1024
ChanSize = 1024

; MaxPacketDataSize: 最大数据包大小（字节）
; 单个数据包的最大大小，超过将被拒绝
; 建议值: 65536-1048576，默认1048576（1MB）
MaxPacketDataSize = 1048576

; DisableEncryption: 是否禁用加密
; true - 禁用加密，提高性能
; false - 启用加密，保障安全
; 内网通信建议设为true
DisableEncryption = true

; EnableKeyRotation: 是否启用密钥轮换
; true - 启用密钥轮换，提高安全性
; false - 禁用密钥轮换，提高性能
EnableKeyRotation = false

; KeyRotationInterval: 密钥轮换间隔（秒）
; 密钥轮换的时间间隔
; 建议值: 1800-7200，默认1800（30分钟）
KeyRotationInterval = 1800

; MaxHistoryKeys: 最大历史密钥数量
; 保留的历史密钥数量，用于处理延迟数据包
; 建议值: 2-10，默认3
MaxHistoryKeys = 3

; EnableSequenceCheck: 是否启用序列号检查
; true - 启用序列号检查，防止重放攻击
; false - 禁用序列号检查，提高性能
EnableSequenceCheck = false

; SequenceWindowSize: 序列号窗口大小
; 序列号检查的窗口大小，用于容忍网络延迟
; 建议值: 100-5000，默认1000
SequenceWindowSize = 1000

; TimestampTolerance: 时间戳容忍度（秒）
; 时间戳检查的容忍范围，用于处理网络延迟
; 建议值: 10-60，默认30
TimestampTolerance = 30

[Database]
; --------------------------------------------
; 数据库配置
; 用于玩家数据持久化存储
; --------------------------------------------
; DBType: 数据库类型
; 当前支持: mysql
; 未来可扩展: postgres, sqlite等
DBType = mysql

; DBHost: 数据库服务器地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
DBHost = 192.168.91.128

; DBPort: 数据库端口
; Kubernetes中MySQL服务的NodePort
DBPort = 3306

; DBName: 数据库名称
; 建议格式: GameDB_区服ID
; 例如: GameDB_000101 表示1区1服
DBName = GameDB_000101

; DBUser: 数据库用户名
; 建议使用具有有限权限的专用账号
; 避免使用root账号
DBUser = root

; DBPassword: 数据库密码
; 生产环境请使用强密码
; 建议定期更换密码
DBPassword = 123456

; MaxOpenConns: 数据库最大连接数
; 根据数据库服务器性能调整
; 建议值: 50-500，默认100
; 注意: 此值不应超过数据库服务器的max_connections设置
MaxOpenConns = 100

; MaxIdleConns: 数据库最大空闲连接数
; 保持空闲连接以便快速响应
; 建议值: 5-50，默认10
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
; 超过此时间的连接将被关闭
; 建议值: 1800-7200，默认3600秒（1小时）
; 设置为0表示不限制，但不推荐
ConnMaxLifetime = 3600

[Gateway]
; --------------------------------------------
; 关联的GatewayServer配置
; --------------------------------------------
; GatewayAddr: GatewayServer连接地址
; 格式: IP:端口
; 用于识别来自Gateway的连接
; 支持从环境变量读取: ${GATEWAY_ADDR}
GatewayAddr = 127.0.0.1:10001

; GatewayConnectTimeout: 连接Gateway超时时间（秒）
; 连接Gateway的最大等待时间
; 建议值: 5-30，默认10秒
GatewayConnectTimeout = 10

[MapServer]
; --------------------------------------------
; 关联的MapServer配置
; --------------------------------------------
; MapServerAddr: MapServer连接地址
; 格式: IP:端口
; 用于与MapServer通信
; 支持从环境变量读取: ${MAP_SERVER_ADDR}
MapServerAddr = 127.0.0.1:30001

[GlobalServer]
; --------------------------------------------
; 关联的GlobalServer配置
; --------------------------------------------
; GlobalServerAddr: GlobalServer连接地址
; 格式: IP:端口
; 用于向GlobalServer注册服务
; 支持从环境变量读取: ${GLOBAL_SERVER_ADDR}
GlobalServerAddr = 127.0.0.1:8888

; RegisterInterval: 注册间隔时间（秒）
; 定期向GlobalServer发送注册心跳
; 建议值: 10-60，默认30秒
RegisterInterval = 30

[Log]
; --------------------------------------------
; 日志配置
; 使用zap高性能日志库
; --------------------------------------------
; Level: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用0(info)或1(warn)
Level = 0

; Console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
Console = true

; ConsoleLevel: 控制台日志级别
; 可选值同 Level，如果不设置则使用 Level 的值
; 用于实现控制台和文件日志级别分离
; ConsoleLevel = 0

; Filename: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
; 支持占位符：{ServerID} 会被替换为实际的服务器ID
Filename = ./logs/game_server_{ServerID}.log

; MaxSize: 日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
MaxSize = 100

; MaxDays: 日志文件最大保存天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
MaxDays = 15

; MaxBackups: 日志文件最大备份数
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
MaxBackups = 10

; Compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
Compress = true

; ShowCaller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
ShowCaller = true

; Stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为3
Stacktrace = 3

; Sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
Sampling = true

; SamplingInitial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
SamplingInitial = 100

; SamplingThereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
SamplingThereafter = 10

; Async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
Async = true

; AsyncBufferSize: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
AsyncBufferSize = 2048

; AsyncFlushInterval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
AsyncFlushInterval = 50

[Metrics]
; --------------------------------------------
; Prometheus监控指标配置
; 用于服务监控和告警
; --------------------------------------------
; Enabled: 是否启用监控指标
; true - 启用，可通过/metrics端点获取指标数据
; false - 禁用
; 生产环境建议启用
Enabled = true

; ListenAddress: 监控指标服务监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; Prometheus将通过此地址抓取指标数据
ListenAddress = 0.0.0.0:9092

[Pprof]
; --------------------------------------------
; pprof性能分析配置
; 用于性能调优和问题排查
; --------------------------------------------
; Enabled: 是否启用pprof功能
; true - 启用，可通过web界面查看性能数据
; false - 禁用
; 生产环境建议关闭，仅在需要性能分析时启用
Enabled = false

; ListenAddress: pprof监听地址
; 格式: IP:端口
; 建议绑定到localhost以提高安全性
; 访问方式: http://localhost:6061/debug/pprof/
ListenAddress = localhost:6061

[Etcd]
; --------------------------------------------
; Etcd服务发现配置
; --------------------------------------------
; Endpoints: etcd服务端点
; 多个端点用逗号分隔
; 格式: https://IP1:端口,https://IP2:端口
Endpoints = http://192.168.91.128:12379

; Username: etcd用户名
; 如需认证，取消下面注释并设置正确的用户名
; Username = admin

; Password: etcd密码
; 如需认证，取消下面注释并设置正确的密码
; Password = password

; CACertPath: CA证书路径
; 用于验证etcd服务器证书
; 留空表示不使用TLS
CACertPath = 

; ClientCertPath: 客户端证书路径
; 用于etcd服务认证
ClientCertPath = 

; ClientKeyPath: 客户端密钥路径
; 用于etcd服务认证
ClientKeyPath =

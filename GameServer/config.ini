; ============================================
; GameServer 配置文件
; 游戏服务器 - 处理游戏逻辑和玩家数据
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerName: 服务器名称，用于日志和监控显示
; 建议格式: GameServer_区服ID
ServerName = GameServer

; ServerID: 服务器唯一标识ID
; 用于区分不同的GameServer实例，多服部署时需要唯一
; 此ID也用于数据库分库分表
ServerID = 101

; GroupID: 服务器分组ID
; 用于服务器分组，同组服务器共享某些资源
; 建议值: 1-15，默认1
GroupID = 1

; ListenAddr: Gateway连接监听地址
; 格式: IP:端口
; Gateway将通过此地址连接到GameServer
; 0.0.0.0 表示监听所有网卡
ListenAddr = 0.0.0.0:20001

; MaxConnections: 最大连接数（来自Gateway的连接）
; 根据服务器硬件配置和预期玩家数量调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; ConnectionTimeout: 连接超时时间（秒）
; 超过此时间无数据交互则断开与Gateway的连接
; 建议值: 60-600，默认300（5分钟）
ConnectionTimeout = 300

; HeartbeatInterval: 心跳检测间隔（秒）
; 服务器定期发送心跳包检测Gateway连接存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

[Gateway]
; --------------------------------------------
; 关联的GatewayServer配置
; --------------------------------------------
; GatewayAddr: GatewayServer连接地址
; 格式: IP:端口
; 用于识别来自Gateway的连接
; 支持从环境变量读取: ${GATEWAY_ADDR}
; 示例: 127.0.0.1:10001
GatewayAddr = 127.0.0.1:10001

[MapServer]
; --------------------------------------------
; 关联的MapServer配置
; --------------------------------------------
; MapServerAddr: MapServer连接地址
; 格式: IP:端口
; 用于与MapServer通信
; 支持从环境变量读取: ${MAP_SERVER_ADDR}
; 示例: 127.0.0.1:30001
MapServerAddr = 127.0.0.1:9002

[Database]
; --------------------------------------------
; 数据库配置
; 用于玩家数据持久化存储
; --------------------------------------------
; DBType: 数据库类型
; 当前支持: mysql
; 未来可扩展: postgres, sqlite等
DBType = mysql

; DBHost: 数据库服务器地址
; 可以是IP地址或域名
; 生产环境建议使用内网地址
DBHost = 192.168.91.128

; DBPort: 数据库端口
; Kubernetes中MySQL服务的NodePort
DBPort = 30306

; DBName: 数据库名称
; 建议格式: GameDB_区服ID
; 例如: GameDB_000101 表示1区1服
DBName = GameDB_000101

; DBUser: 数据库用户名
; 建议使用具有有限权限的专用账号
; 避免使用root账号
DBUser = root

; DBPassword: 数据库密码
; 生产环境请使用强密码
; 建议定期更换密码
DBPassword = 123456

; MaxOpenConns: 数据库最大连接数
; 根据数据库服务器性能调整
; 建议值: 50-500，默认100
; 注意: 此值不应超过数据库服务器的max_connections设置
MaxOpenConns = 100

; MaxIdleConns: 数据库最大空闲连接数
; 保持空闲连接以便快速响应
; 建议值: 5-50，默认10
MaxIdleConns = 10

; ConnMaxLifetime: 连接最大生命周期（秒）
; 超过此时间的连接将被关闭
; 建议值: 1800-7200，默认3600秒（1小时）
; 设置为0表示不限制，但不推荐
ConnMaxLifetime = 3600

[Logging]
; --------------------------------------------
; 日志配置
; --------------------------------------------
; LogLevel: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用info或warn
LogLevel = 0

; LogFile: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
LogFile = logs/server.log

; LogMaxSize: 单个日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
LogMaxSize = 100

; LogMaxBackups: 日志文件保留数量
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
LogMaxBackups = 10

; LogMaxAge: 日志文件保留天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
LogMaxAge = 15

; console: 是否输出到控制台（高级选项）
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
; 如需启用，取消下面注释:
; console = true

; compress: 是否压缩日志文件（高级选项）
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
; 如需启用，取消下面注释:
; compress = true

; async: 是否启用异步写入（高级选项）
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 如需启用，取消下面注释:
async = true

[Etcd]
; --------------------------------------------
; Etcd服务发现配置
; --------------------------------------------
; Endpoints: etcd服务端点
; 多个端点用逗号分隔
; 格式: https://IP1:端口,https://IP2:端口
Endpoints = https://192.168.91.128:2379

; Username: etcd用户名
; 如需认证，取消下面注释并设置正确的用户名
; Username = admin

; Password: etcd密码
; 如需认证，取消下面注释并设置正确的密码
; Password = password

; CACertPath: CA证书路径
; 用于验证etcd服务器证书
; 默认为: resources/etcd/ca.crt
CACertPath = ../resources/etcd/ca.crt

; ClientCertPath: 客户端证书路径
; 用于etcd服务认证
; 默认为: resources/etcd/server.crt
ClientCertPath = ../resources/etcd/server.crt

; ClientKeyPath: 客户端密钥路径
; 用于etcd服务认证
; 默认为: resources/etcd/server.key
ClientKeyPath = ../resources/etcd/server.key

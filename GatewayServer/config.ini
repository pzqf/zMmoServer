; ============================================
; GatewayServer 配置文件
; 网关服务器 - 客户端接入和游戏服务器转发
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerName: 服务器名称，用于日志和监控显示
; 建议格式: GatewayServer_区服ID
ServerName = GatewayServer

; ServerID: 服务器唯一标识ID
; 用于区分不同的GatewayServer实例，多服部署时需要唯一
ServerID = 1

; ListenAddr: 客户端连接监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; 生产环境建议绑定具体IP
ListenAddr = 0.0.0.0:8081

; MaxConnections: 最大客户端连接数
; 根据服务器硬件配置调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; ConnectionTimeout: 连接超时时间（秒）
; 超过此时间无数据交互则断开连接
; 建议值: 60-600，默认300（5分钟）
ConnectionTimeout = 300

; HeartbeatInterval: 心跳检测间隔（秒）
; 服务器定期发送心跳包检测客户端存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

[Security]
; --------------------------------------------
; 安全配置
; --------------------------------------------
; TokenSecret: JWT令牌密钥
; 用于生成和验证Token，必须保密
; 生产环境请使用强随机字符串，长度建议32位以上
TokenSecret = zMmoServerSecretKey

; TokenExpiry: Token过期时间（秒）
; 客户端Token有效期，过期需要重新登录
; 建议值: 3600(1小时) - 86400(1天)，默认86400
TokenExpiry = 86400

; MaxLoginAttempts: 最大登录尝试次数
; 防止暴力破解，超过次数将临时封禁
; 建议值: 3-10，默认5次
MaxLoginAttempts = 5

; BanDuration: 登录失败封禁时长（秒）
; 超过MaxLoginAttempts后的封禁时间
; 建议值: 300(5分钟) - 3600(1小时)，默认3600
BanDuration = 3600

[GameServer]
; --------------------------------------------
; 关联的GameServer配置
; --------------------------------------------
; GameServerID: 关联的GameServer ID
; 用于标识当前Gateway转发到哪个GameServer
GameServerID = 1

; GameServerAddr: GameServer连接地址
; 格式: IP:端口
; Gateway将客户端请求转发到此地址
GameServerAddr = 127.0.0.1:9001

; GameServerConnectTimeout: 连接GameServer超时时间（秒）
; 连接GameServer的最大等待时间
; 建议值: 5-30，默认10秒
GameServerConnectTimeout = 10

[Logging]
; --------------------------------------------
; 日志配置
; 参考zGameServer的详细日志配置
; --------------------------------------------
; LogLevel: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用info或warn
LogLevel = 0

; console: 是否输出到控制台
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
console = true

; LogFile: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
LogFile = logs/server.log

; LogMaxSize: 单个日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
LogMaxSize = 100

; LogMaxBackups: 日志文件保留数量
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
LogMaxBackups = 10

; LogMaxAge: 日志文件保留天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
LogMaxAge = 15

; compress: 是否压缩日志文件
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
compress = true

; show-caller: 显示调用者信息
; true - 显示调用文件名和行号
; false - 不显示
; 生产环境建议关闭以提高性能
show-caller = true

; stacktrace: 打印栈跟踪信息深度
; 在error级别及以上打印栈跟踪
; 默认深度为2
stacktrace = 3

; sampling: 是否启用采样
; true - 启用日志采样，减少日志量
; false - 不采样，记录所有日志
; 生产环境建议启用
sampling = true

; sampling-initial: 采样初始数量
; 在指定时间内记录的前N条日志
; 默认100条
sampling-initial = 100

; sampling-thereafter: 采样后续数量
; 在指定时间内，初始数量之后每N条记录1条
; 默认10条记录1条
sampling-thereafter = 10

; async: 是否启用异步写入
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 生产环境建议启用
async = true

; async-buffer-size: 异步写入缓冲区大小（条）
; 缓冲区满时会阻塞
; 建议值: 512-4096，默认2048
async-buffer-size = 2048

; async-flush-interval: 异步刷新间隔（毫秒）
; 定期刷新缓冲区到文件
; 建议值: 50-500，默认50ms
async-flush-interval = 50

[Metrics]
; --------------------------------------------
; 监控指标配置
; --------------------------------------------
; Enabled: 是否启用监控服务
; true - 启用，false - 禁用
; 生产环境建议启用以便监控服务器状态
Enabled = true

; MetricsAddr: 监控服务监听地址
; 格式: IP:端口
; 用于Prometheus等监控系统采集指标
MetricsAddr = 0.0.0.0:9091

[ddos]
; --------------------------------------------
; DDoS防护配置
; 防止恶意攻击和滥用
; --------------------------------------------
; max_conn_per_ip: 单个IP最大连接数
; 防止单一IP建立过多连接
; 建议值: 5-50，默认10
max_conn_per_ip = 10

; conn_time_window: 连接统计时间窗口（秒）
; 在此时间窗口内统计连接数
; 建议值: 30-300，默认60秒
conn_time_window = 60

; max_packets_per_ip: 单个IP最大数据包数
; 防止单一IP发送过多数据包
; 建议值: 50-500，默认100
max_packets_per_ip = 100

; packet_time_window: 数据包统计时间窗口（秒）
; 在此时间窗口内统计数据包数
; 建议值: 1-10，默认1秒
packet_time_window = 1

; max_bytes_per_ip: 单个IP最大流量（字节）
; 防止单一IP占用过多带宽
; 默认10485760 = 10MB
; 建议值: 5MB-100MB
max_bytes_per_ip = 10485760

; traffic_time_window: 流量统计时间窗口（秒）
; 在此时间窗口内统计流量
; 建议值: 1800-7200，默认3600秒（1小时）
traffic_time_window = 3600

; ban_duration: IP封禁时长（秒）
; 触发DDoS规则后的封禁时间
; 默认86400 = 24小时
; 建议值: 3600(1小时) - 86400(1天)
ban_duration = 86400

[net_compression]
; --------------------------------------------
; 网络压缩配置
; 减少网络传输数据量，提升性能
; --------------------------------------------
; enabled: 是否启用压缩
; true - 启用，false - 禁用
; 建议在网络质量较差时启用
enabled = true

; threshold: 压缩阈值（字节）
; 只有超过此大小的数据包才会压缩
; 建议值: 512-2048，默认1024字节
threshold = 1024

; level: 压缩级别
; Snappy压缩不支持级别调整，保留此配置用于兼容
; 实际压缩率由Snappy算法决定
level = 1

; min_quality: 最低网络质量（0-100）
; 当网络质量低于此值时，更积极地压缩
; 0表示最差，100表示最好
; 建议值: 0-30
min_quality = 0

; max_quality: 最高网络质量（0-100）
; 当网络质量高于此值时，减少压缩
; 建议值: 70-100
max_quality = 100

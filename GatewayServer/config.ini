; ============================================
; GatewayServer 配置文件
; 网关服务器 - 客户端接入和游戏服务器转发
; ============================================

[Server]
; --------------------------------------------
; 服务器基本配置
; --------------------------------------------
; ServerName: 服务器名称，用于日志和监控显示
; 建议格式: GatewayServer_区服ID
ServerName = GatewayServer

; ServerID: 服务器唯一标识ID
; 用于区分不同的GatewayServer实例，多服部署时需要唯一
ServerID = 1

; ListenAddr: 客户端连接监听地址
; 格式: IP:端口
; 0.0.0.0 表示监听所有网卡
; 生产环境建议绑定具体IP
ListenAddr = 0.0.0.0:10001

; ExternalAddr: 外网访问地址（客户端实际连接的地址）
; 格式: IP:端口 或 域名:端口
; 用于心跳上报给GlobalServer，让客户端知道连接哪个地址
; 支持从环境变量读取: ${EXTERNAL_ADDR}
; 如果不配置，默认使用ListenAddr
; 生产环境必须配置正确的公网地址
; 示例: 123.45.67.89:10001 或 gateway1.example.com:10001
; ExternalAddr = 123.45.67.89:10001

; MaxConnections: 最大客户端连接数
; 根据服务器硬件配置调整
; 建议值: 1000-50000，默认10000
MaxConnections = 10000

; ConnectionTimeout: 连接超时时间（秒）
; 超过此时间无数据交互则断开连接
; 建议值: 60-600，默认300（5分钟）
ConnectionTimeout = 300

; HeartbeatInterval: 心跳检测间隔（秒）
; 服务器定期发送心跳包检测客户端存活
; 建议值: 10-60，默认30秒
HeartbeatInterval = 30

; JWTSecret: JWT令牌密钥
; 用于生成和验证Token，必须保密
; 多实例部署时所有实例必须使用相同的密钥
; 生产环境请使用强随机字符串，长度建议32位以上
JWTSecret = zMmoServerSecretKey

; UseWorkerPool: 是否使用工作池模式（高级选项）
; true - 启用工作池，提高并发处理能力
; false - 禁用工作池，每个连接使用单独的goroutine
; 如需启用，取消下面注释:
; UseWorkerPool = true

; WorkerPoolSize: 工作池大小（高级选项）
; 处理客户端消息的工作线程数
; 建议值: 50-500，根据CPU核心数调整
; 一般设置为CPU核心数的2-4倍
; 如需启用，取消下面注释:
; WorkerPoolSize = 100

; WorkerQueueSize: 工作队列大小（高级选项）
; 每个工作线程的消息队列大小
; 建议值: 1000-50000，默认10000
; 如需启用，取消下面注释:
; WorkerQueueSize = 10000

[GameServer]
; --------------------------------------------
; 关联的GameServer配置
; --------------------------------------------
; GameServerID: 关联的GameServer ID
; 用于标识当前Gateway转发到哪个GameServer
GameServerID = 1

; GameServerAddr: GameServer连接地址
; 格式: IP:端口
; Gateway将主动连接到此地址，建立TCP长连接
; 用于转发客户端请求到GameServer
GameServerAddr = 127.0.0.1:20001

; GameServerConnectTimeout: 连接GameServer超时时间（秒）
; 连接GameServer的最大等待时间
; 建议值: 5-30，默认10秒
GameServerConnectTimeout = 10

[GlobalServer]
; --------------------------------------------
; GlobalServer注册配置
; --------------------------------------------
; GlobalServerAddr: GlobalServer服务器地址
; 格式: IP:端口
; Gateway将向此地址注册，并定期上报心跳
; 心跳内容包括: 在线人数、服务器状态、ExternalAddr等
GlobalServerAddr = 127.0.0.1:8888

; RegisterInterval: 注册间隔（秒）
; Gateway定期向GlobalServer注册
; 建议值: 10-60，默认30秒
RegisterInterval = 30

; HeartbeatInterval: 心跳上报间隔（秒）
; Gateway定期向GlobalServer上报心跳
; 心跳内容包括: 在线人数、服务器状态
; 建议值: 5-30，默认10秒
HeartbeatInterval = 10

[Security]
; --------------------------------------------
; 安全配置（可选）
; --------------------------------------------
; TokenExpiry: Token过期时间（秒）
; 客户端Token有效期，过期需要重新登录
; 建议值: 3600(1小时) - 86400(1天)，默认86400
; 如需启用，取消下面注释:
; TokenExpiry = 3600

; MaxLoginAttempts: 最大登录尝试次数
; 防止暴力破解，超过次数将临时封禁
; 建议值: 3-10，默认5次
; 如需启用，取消下面注释:
; MaxLoginAttempts = 5

; BanDuration: 登录失败封禁时长（秒）
; 超过MaxLoginAttempts后的封禁时间
; 建议值: 300(5分钟) - 3600(1小时)，默认3600
; 如需启用，取消下面注释:
; BanDuration = 300

[Logging]
; --------------------------------------------
; 日志配置
; --------------------------------------------
; LogLevel: 日志级别
; 可选值: -1(debug), 0(info), 1(warn), 2(error), 3(dpanic), 4(panic), 5(fatal)
; 生产环境建议使用info或warn
LogLevel = 0

; LogFile: 日志文件路径
; 支持相对路径和绝对路径
; 默认保存在程序运行目录下的logs文件夹
LogFile = logs/gateway_server.log

; LogMaxSize: 单个日志文件最大大小（MB）
; 超过此大小将自动轮转
; 建议值: 10-500，默认100MB
LogMaxSize = 100

; LogMaxBackups: 日志文件保留数量
; 超过数量的旧日志将被删除
; 建议值: 3-30，默认10个
LogMaxBackups = 10

; LogMaxAge: 日志文件保留天数
; 超过天数的日志将被删除
; 建议值: 7-90，默认15天
LogMaxAge = 15

; console: 是否输出到控制台（高级选项）
; true - 输出到控制台，方便开发调试
; false - 只输出到文件，适合生产环境
; 如需启用，取消下面注释:
; console = true

; compress: 是否压缩日志文件（高级选项）
; true - 压缩旧日志文件，节省磁盘空间
; false - 不压缩
; 如需启用，取消下面注释:
; compress = true

; async: 是否启用异步写入（高级选项）
; true - 异步写入，提高性能
; false - 同步写入，确保日志不丢失
; 如需启用，取消下面注释:
async = true
